# cargo-audit configuration, read automatically by `cargo audit` (and by
# `./cli audit`, which runs `cargo audit --deny warnings`). CI runs the same
# command in the daily Dependency Audit workflow.
#
# Every advisory below has been triaged and CANNOT currently be resolved by a
# version bump. Re-triaged 2026-07-15 against the lightyear 0.28 tree: every
# relevant direct dependency is at its newest published release, lightyear
# 0.28.0, postcard 1.1.3, opus 0.3.1, rapier3d 0.32.0, and all six flagged
# crates are still present at the same versions as transitive deps those
# crates have not yet migrated off.
#
# Recheck each ID whenever a dependency is bumped: run a plain `cargo audit`
# (no ignores) to see which advisories have since become resolvable, then drop
# the corresponding entry here and in deny.toml's [advisories].ignore. Keep the
# two lists in sync.

[advisories]
ignore = [
    # steamworks 0.12.2, Denial of service in P2P authentication.
    # NOT COMPILED into Ashwend: lightyear is built with
    # default-features = false and we never enable its `steam` feature, so
    # steamworks is present in Cargo.lock but never linked. The patched
    # 0.13.1 is pinned out by aeronet_steam's `steamworks = "^0.12.2"`;
    # resolving it needs a newer lightyear_steam/lightyear, and 0.28.0 is the
    # latest release. This is the only *vulnerability* in the report.
    "RUSTSEC-2026-0121",

    # atomic-polyfill 1.0.3, unmaintained. Via heapless 0.7 <- postcard
    # 1.1.3 (latest). heapless >= 0.8 dropped atomic-polyfill, but postcard
    # has not upgraded its heapless dependency yet.
    "RUSTSEC-2023-0089",

    # audiopus_sys 0.2.2, unmaintained. Via opus 0.3.1 (latest). No
    # maintained successor has been published; opus is the only mature libopus
    # binding that hits our voice-quality target.
    "RUSTSEC-2026-0150",

    # bincode 2.0.1, unmaintained. Via lightyear_serde <- lightyear 0.28.0
    # (latest). Tracks lightyear's own serialization choice.
    "RUSTSEC-2025-0141",

    # paste 1.0.15, unmaintained (proc-macro). Via lightyear_utils, metal,
    # and simba (rapier3d), all at their latest releases.
    "RUSTSEC-2024-0436",

    # rustls-pemfile 2.2.0, unmaintained. NOT COMPILED into Ashwend: reaches
    # the lockfile only through wtransport (lightyear's `webtransport`
    # feature), which we do not enable.
    "RUSTSEC-2025-0134",
]
