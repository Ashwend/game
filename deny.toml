# cargo-deny configuration. Run via `cargo deny check` (CI runs it as part of
# the daily Dependency Audit workflow alongside `cargo audit`). The goal is
# to catch what `cargo audit` misses: license drift, duplicate transitive
# crates (especially bevy/rapier majors), and dependencies coming from
# unexpected sources.
#
# Reference: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[advisories]
# Advisory checks are handled by `cargo audit` in a separate job. Leave
# them on here too so `cargo deny check` on its own is a useful pre-push
# gate, but downgrade unmaintained crates to warn so unrelated upstream
# yellow flags don't block a PR while we're still on the same crate
# version.
version = 2
yanked = "deny"
# Kept in sync with .cargo/audit.toml. Each ID is a triaged advisory that
# cannot currently be resolved by a version bump, every relevant direct dep
# (lightyear 0.28.0, postcard 1.1.3, opus 0.3.1, rapier3d 0.32.0) is already
# at its latest release. RUSTSEC-2026-0121 (steamworks) and RUSTSEC-2025-0134
# (rustls-pemfile) are lockfile-only: the `steam` and `webtransport` lightyear
# features are off, so neither crate is compiled. See .cargo/audit.toml for
# the per-ID rationale and the recheck procedure.
ignore = [
    "RUSTSEC-2026-0121", # steamworks DoS, not compiled (steam feature off)
    "RUSTSEC-2023-0089", # atomic-polyfill unmaintained, via heapless<-postcard
    "RUSTSEC-2026-0150", # audiopus_sys unmaintained, via opus
    "RUSTSEC-2025-0141", # bincode unmaintained, via lightyear_serde
    "RUSTSEC-2024-0436", # paste unmaintained, via lightyear/metal/simba
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained, not compiled (webtransport off)
]

[licenses]
version = 2
# Skip license vetting on our own crate. ashwend is `publish = false` and ships
# under PolyForm-Noncommercial-1.0.0 (`license-file = "LICENSE"`), a
# source-available game license, not a dependency license. cargo-deny matches
# the LICENSE text at only 0.83 confidence and it isn't (and shouldn't be) on
# the code-license allow-list below, so without this it reports ashwend itself
# as "unlicensed".
private = { ignore = true }
# Permissive OSS licenses that have been reviewed for compatibility. Anything
# outside this list must be added explicitly with a one-line justification.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.93
# Per-crate allowances for non-code licenses that only appear on bundled
# font/data assets. Scoped to the owning crate (all versions) so they can't
# silently apply to anything else. Both are well-known permissive licenses.
exceptions = [
    # egui's bundled default fonts (Hack, Ubuntu, Noto Emoji). OFL-1.1 is the
    # SIL Open Font License; Ubuntu-font-1.0 covers the Ubuntu font family.
    { allow = ["OFL-1.1", "Ubuntu-font-1.0"], crate = "epaint_default_fonts" },
    # Mozilla root-certificate data shipped by webpki-roots (pulled in by ureq's
    # TLS stack). CDLA-Permissive-2.0 is a permissive data-sharing license.
    { allow = ["CDLA-Permissive-2.0"], crate = "webpki-roots" },
]

[bans]
# Multiple versions of the same major crate are the usual symptom of a
# transitive bump that nobody noticed. `warn` instead of `deny` because the
# bevy + lightyear + rapier ecosystem regularly carries short-lived
# duplicates during version transitions; CI surfaces them in the audit
# report without blocking merges. Switch to `deny` once those graphs stabilize.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
allow = []
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
