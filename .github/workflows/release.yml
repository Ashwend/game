name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: SemVer component to bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      draft:
        description: Create the GitHub release as a draft
        required: true
        default: false
        type: boolean
      existing_tag:
        description: Existing v* tag to publish again without bumping; use this to repair a failed publish step
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      tag: ${{ steps.prepare.outputs.tag }}
      base_sha: ${{ steps.prepare.outputs.base_sha }}
      release_notes: ${{ steps.prepare.outputs.release_notes }}
      patch_required: ${{ steps.prepare.outputs.patch_required }}
    steps:
      - name: Require main branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Run releases from main. Current ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Rust toolchain
        run: rustup toolchain install --profile minimal

      - name: Prepare release metadata
        id: prepare
        run: |
          args=(--notes release-notes.txt)
          if [ -n "${{ inputs.existing_tag }}" ]; then
            args+=(--existing-tag "${{ inputs.existing_tag }}")
          else
            args+=(--bump "${{ inputs.bump }}")
          fi

          python .github/scripts/prepare-release.py "${args[@]}"

      - name: Refresh lockfile
        if: steps.prepare.outputs.patch_required == 'true'
        run: cargo generate-lockfile

      - name: Create release patch
        if: steps.prepare.outputs.patch_required == 'true'
        run: |
          git diff --binary Cargo.toml Cargo.lock > release.patch
          test -s release.patch

      - name: Upload release patch
        if: steps.prepare.outputs.patch_required == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-source-patch
          path: release.patch
          if-no-files-found: error
          retention-days: 7

      - name: Upload release notes
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.txt
          if-no-files-found: error
          retention-days: 7

      - name: Write release metadata
        run: |
          {
            echo "VERSION=${{ steps.prepare.outputs.version }}"
            echo "TAG=${{ steps.prepare.outputs.tag }}"
            echo "BASE_SHA=${{ steps.prepare.outputs.base_sha }}"
            echo "PATCH_REQUIRED=${{ steps.prepare.outputs.patch_required }}"
            echo "DRAFT=${{ inputs.draft }}"
          } > release-metadata.env

      - name: Upload release metadata
        uses: actions/upload-artifact@v7
        with:
          name: release-metadata
          path: release-metadata.env
          if-no-files-found: error
          retention-days: 7

  verify_quality_gate:
    name: Verify Quality Gate is green on base_sha
    needs: prepare
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BASE_SHA: ${{ needs.prepare.outputs.base_sha }}
    steps:
      - name: Require successful Quality Gate run on base_sha
        run: |
          set -euo pipefail
          # The release pipeline builds and ships whatever `base_sha` points
          # to. Without this gate, a workflow_dispatch could publish a
          # release of a SHA whose Quality Gate is still red (or never ran).
          # Auto-deploy then ships the broken artifact to the live server.
          #
          # Poll the Actions API for a Quality Gate run on this exact SHA
          # and require it to have finished with `conclusion=success`. The
          # short retry loop covers the case where Quality Gate is still
          # queued or running for a freshly-pushed commit.
          for attempt in 1 2 3 4 5 6; do
            payload="$(gh api \
              -X GET \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/quality-gate.yml/runs" \
              -f head_sha="${BASE_SHA}" \
              -f per_page=10 || true)"

            status="$(printf '%s' "${payload}" | jq -r \
              '[.workflow_runs[]?] | sort_by(.run_started_at) | reverse | .[0].status // empty')"
            conclusion="$(printf '%s' "${payload}" | jq -r \
              '[.workflow_runs[]?] | sort_by(.run_started_at) | reverse | .[0].conclusion // empty')"

            if [ "${status}" = "completed" ] && [ "${conclusion}" = "success" ]; then
              echo "Quality Gate is green on ${BASE_SHA}"
              exit 0
            fi

            if [ "${status}" = "completed" ] && [ -n "${conclusion}" ] && [ "${conclusion}" != "success" ]; then
              echo "Quality Gate for ${BASE_SHA} concluded with '${conclusion}'; refusing to ship" >&2
              exit 1
            fi

            echo "Quality Gate run for ${BASE_SHA} status='${status:-unknown}' conclusion='${conclusion:-none}'; retrying (${attempt}/6)..."
            sleep 30
          done

          echo "No completed Quality Gate run found for ${BASE_SHA} after waiting." >&2
          echo "Ensure Quality Gate has run successfully on the commit you are releasing before retrying." >&2
          exit 1

  build:
    name: Build ${{ matrix.label }}
    needs:
      - prepare
      - verify_quality_gate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux Intel
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset: ashwend-x86_64-unknown-linux-gnu.tar.gz
          - label: Linux ARM
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: ashwend-aarch64-unknown-linux-gnu.tar.gz
          - label: macOS ARM
            runner: macos-15
            target: aarch64-apple-darwin
            asset: ashwend-aarch64-apple-darwin.zip
          - label: Windows Intel
            runner: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
            asset: ashwend-x86_64-pc-windows-msvc.zip
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.base_sha }}

      - name: Download release patch
        if: needs.prepare.outputs.patch_required == 'true'
        uses: actions/download-artifact@v7
        with:
          name: release-source-patch
          path: .

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Apply release patch
        if: needs.prepare.outputs.patch_required == 'true'
        run: git apply release.patch

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ pkg-config libx11-dev libasound2-dev libudev-dev libxkbcommon-x11-0 libwayland-dev libxkbcommon-dev libopus-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        # The audiopus_sys build script tries pkg-config on cfg(unix) and
        # falls back to building Opus from its bundled CMakeLists otherwise.
        # CMake 4.x on the runners refuses that bundled build because the
        # vendored CMakeLists declares a pre-3.5 minimum. Install opus via
        # brew and pin PKG_CONFIG_PATH so audiopus_sys finds it first.
        run: |
          brew install opus
          echo "PKG_CONFIG_PATH=$(brew --prefix opus)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      - name: Install Windows dependencies (vcpkg opus)
        if: runner.os == 'Windows'
        # `audiopus_sys` only checks pkg-config on `cfg(unix)`, so on Windows
        # MSVC it falls through to building Opus from its bundled CMakeLists,
        # which now fails because CMake 4.x removed compatibility with the
        # < 3.5 `cmake_minimum_required` it declares. Install a pre-built
        # opus via vcpkg and point audiopus_sys at it via `OPUS_LIB_DIR` so
        # the bundled cmake build is skipped entirely. Static (`-static-md`)
        # so the shipped binary doesn't need an opus.dll alongside it.
        #
        # `OPUS_LIB_DIR` is a prefix: audiopus_sys's build script appends
        # `/lib` itself when emitting `rustc-link-search=native=`, so pass
        # the vcpkg triplet root rather than its `lib/` subfolder.
        shell: bash
        run: |
          "$VCPKG_INSTALLATION_ROOT/vcpkg.exe" install opus:x64-windows-static-md
          opus_root="$VCPKG_INSTALLATION_ROOT/installed/x64-windows-static-md"
          echo "OPUS_LIB_DIR=${opus_root}" >> "$GITHUB_ENV"
          echo "OPUS_STATIC=1" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        run: rustup toolchain install --profile minimal --target "${{ matrix.target }}"

      - name: Build release binary
        # PostHog config is embedded at compile time via `option_env!()` in
        # `src/analytics/config.rs`. The repository variables below are the
        # production project key + environment — players running the
        # shipped binary phone home without any runtime env-var setup. The
        # values are GitHub Variables (not Secrets) because PostHog project
        # API keys are public-ish ingestion keys, not credentials.
        #
        # The WorkOS client id is likewise embedded via `option_env!()` in
        # `src/auth/workos/config.rs`, so shipped client + dedicated-server
        # binaries carry the right id (the JWKS endpoint it points at) with no
        # runtime setup. It's a public client id, not a secret.
        env:
          POSTHOG_API_KEY: ${{ vars.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
          POSTHOG_ENVIRONMENT: ${{ vars.POSTHOG_ENVIRONMENT }}
          POSTHOG_ENABLED: ${{ vars.POSTHOG_ENABLED }}
          POSTHOG_DISABLE_GEOIP: ${{ vars.POSTHOG_DISABLE_GEOIP }}
          GAME_WORKOS_CLIENT_ID: ${{ vars.GAME_WORKOS_CLIENT_ID }}
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package release binary
        run: python .github/scripts/package-release.py --target "${{ matrix.target }}" --asset "${{ matrix.asset }}" --version "${{ needs.prepare.outputs.version }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - build
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ needs.prepare.outputs.tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
      BASE_SHA: ${{ needs.prepare.outputs.base_sha }}
    steps:
      - name: Checkout release source
        if: needs.prepare.outputs.patch_required == 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.base_sha }}
          fetch-depth: 0

      - name: Checkout workflow source
        if: needs.prepare.outputs.patch_required != 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download release patch
        if: needs.prepare.outputs.patch_required == 'true'
        uses: actions/download-artifact@v7
        with:
          name: release-source-patch
          path: .

      - name: Apply release patch
        if: needs.prepare.outputs.patch_required == 'true'
        run: git apply release.patch

      - name: Download release notes
        uses: actions/download-artifact@v7
        with:
          name: release-notes
          path: .

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: ashwend-*
          path: artifacts
          merge-multiple: true

      - name: Commit and tag release
        if: needs.prepare.outputs.patch_required == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock

          release_tree="$(git write-tree)"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
            tag_commit="$(git rev-list -n 1 "${TAG}")"
            tag_tree="$(git rev-parse "${tag_commit}^{tree}")"
            if [ "${tag_tree}" != "${release_tree}" ]; then
              echo "tag ${TAG} already exists but does not match this release tree" >&2
              exit 1
            fi
            echo "tag ${TAG} already exists with the expected release tree; continuing"
            exit 0
          fi

          remote_sha="$(git ls-remote origin "refs/heads/${GITHUB_REF_NAME}" | awk '{print $1}')"
          if [ "${remote_sha}" != "${BASE_SHA}" ]; then
            echo "main moved while this release was building; rerun the workflow from the latest main" >&2
            exit 1
          fi

          git commit -m "release: ${TAG}"
          git tag -a "${TAG}" -m "${TAG}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "${TAG}"

      - name: Verify existing release tag
        if: needs.prepare.outputs.patch_required != 'true'
        run: |
          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
          tag_commit="$(git rev-list -n 1 "${TAG}")"
          if [ "${tag_commit}" != "${BASE_SHA}" ]; then
            echo "tag ${TAG} resolved to ${tag_commit}, expected ${BASE_SHA}" >&2
            exit 1
          fi

      - name: Create or update GitHub release
        run: |
          retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi
              sleep $((attempt * 10))
            done
            return 1
          }

          release_exists() {
            gh release view "${TAG}" >/dev/null 2>&1
          }

          edit_release() {
            retry gh release edit "${TAG}" \
              --title "Ashwend ${TAG}" \
              --notes-file release-notes.txt
          }

          create_release() {
            local create_args
            create_args=(release create "${TAG}" --verify-tag --title "Ashwend ${TAG}" --notes-file release-notes.txt)
            if [ "${{ inputs.draft }}" = "true" ]; then
              create_args+=(--draft)
            fi

            local attempt
            for attempt in 1 2 3 4 5; do
              if gh "${create_args[@]}"; then
                return 0
              fi
              if release_exists; then
                edit_release
                return $?
              fi
              sleep $((attempt * 10))
            done

            return 1
          }

          if release_exists; then
            edit_release
          else
            create_release
          fi

          for asset in artifacts/*; do
            retry gh release upload "${TAG}" "${asset}" --clobber
          done

          refresh_asset_links() {
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" > release.json
            python .github/scripts/update-release-asset-links.py \
              --notes release-notes.txt \
              --release-json release.json \
              --require-all
            gh release edit "${TAG}" \
              --title "Ashwend ${TAG}" \
              --notes-file release-notes.txt
          }

          retry refresh_asset_links
