name: Deploy Hetzner Dedicated Server

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-hetzner-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

env:
  GAME_SERVICE_USER: game-server
  GAME_SERVICE_NAME: game-server
  GAME_BIND_ADDR: 0.0.0.0:7777
  GAME_AUTH_MODE: workos
  GAME_RESTART_NOTICE_SECONDS: "15"
  GAME_MAP_SIZE: large
  # Bump this (e.g. world -> world-2) to wipe BleedingEdge: a new name makes the
  # server generate a fresh world file and leaves the previous save as a backup.
  # Required when changing GAME_MAP_SIZE, the server refuses to start if the
  # requested size doesn't match the existing save under this name.
  GAME_WORLD_NAME: world-1

jobs:
  deploy:
    name: Deploy release ARM artifact
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04-arm
    environment: BleedingEdge
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          mkdir -p release-artifacts
          gh run download "${RELEASE_RUN_ID}" --name release-metadata --dir release-artifacts
          gh run download "${RELEASE_RUN_ID}" --name ashwend-aarch64-unknown-linux-gnu.tar.gz --dir release-artifacts
          test -f release-artifacts/release-metadata.env
          test -f release-artifacts/ashwend-aarch64-unknown-linux-gnu.tar.gz

      - name: Read release metadata
        id: release
        run: |
          set -a
          . release-artifacts/release-metadata.env
          set +a

          echo "version=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "sha=${BASE_SHA}" >> "${GITHUB_OUTPUT}"
          if [ "${DRAFT}" = "true" ]; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "Release ${TAG} is a draft; skipping BleedingEdge deployment."
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Validate SSH secrets
        if: steps.release.outputs.skip != 'true'
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          test -n "${HETZNER_HOST}" || { echo "HETZNER_HOST secret is required" >&2; exit 1; }
          test -n "${HETZNER_SSH_KEY}" || { echo "HETZNER_SSH_KEY secret is required" >&2; exit 1; }

      - name: Configure SSH
        if: steps.release.outputs.skip != 'true'
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_KNOWN_HOSTS: ${{ secrets.HETZNER_KNOWN_HOSTS }}
        run: |
          port="${HETZNER_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${HETZNER_SSH_KEY}" > ~/.ssh/hetzner
          chmod 600 ~/.ssh/hetzner

          if [ -n "${HETZNER_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${HETZNER_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${port}" "${HETZNER_HOST}" > ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Upload and deploy
        if: steps.release.outputs.skip != 'true'
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          DEPLOY_SHA: ${{ steps.release.outputs.sha }}
          DEPLOY_VERSION: ${{ steps.release.outputs.version }}
        run: |
          port="${HETZNER_PORT:-22}"
          user="${HETZNER_USER:-root}"
          target="${user}@${HETZNER_HOST}"
          remote_archive="/tmp/game-server-${DEPLOY_SHA}.tar.gz"
          remote_script="/tmp/deploy-game-server-${DEPLOY_SHA}.sh"
          ssh_opts=(-i ~/.ssh/hetzner -p "${port}" -o IdentitiesOnly=yes)
          scp_opts=(-i ~/.ssh/hetzner -P "${port}" -o IdentitiesOnly=yes)

          scp "${scp_opts[@]}" release-artifacts/ashwend-aarch64-unknown-linux-gnu.tar.gz "${target}:${remote_archive}"
          scp "${scp_opts[@]}" .github/scripts/deploy-hetzner-server.sh "${target}:${remote_script}"
          ssh "${ssh_opts[@]}" "${target}" \
            "chmod +x '${remote_script}' && '${remote_script}' '${remote_archive}' '${DEPLOY_VERSION}' '${GAME_SERVICE_USER}' '${GAME_SERVICE_NAME}' '${GAME_BIND_ADDR}' '${GAME_AUTH_MODE}' '${GAME_RESTART_NOTICE_SECONDS}' '${GAME_MAP_SIZE}' '${GAME_WORLD_NAME}'"
