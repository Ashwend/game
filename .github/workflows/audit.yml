name: Dependency Audit

on:
  schedule:
    # 06:00 UTC daily ≈ 07:00 CET (winter) / 08:00 CEST (summer).
    - cron: "0 6 * * *"
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - ".cargo/audit.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - ".cargo/audit.toml"
      - ".github/workflows/audit.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: rustup toolchain install --profile minimal

      - name: Cache Cargo data
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: audit
          shared-key: ${{ runner.os }}-${{ runner.arch }}
          cache-bin: true

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Run cargo audit
        run: cargo audit --deny warnings

  deny:
    name: cargo deny
    runs-on: ubuntu-24.04
    # `cargo audit` covers the advisory database. This job covers what audit
    # doesn't: license drift, duplicate transitive majors, and dependencies
    # coming from unexpected registries/git sources. Config lives in
    # /deny.toml at the repo root.
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: rustup toolchain install --profile minimal

      - name: Cache Cargo data
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: deny
          shared-key: ${{ runner.os }}-${{ runner.arch }}
          cache-bin: true

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          # `bans` is configured as `warn` for multiple-versions in deny.toml
          # so the bevy/rapier/lightyear transitive graph doesn't block PRs
          # — the noisier checks here are licenses, advisories, and sources.
          command-arguments: "--hide-inclusion-graph"
