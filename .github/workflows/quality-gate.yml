name: Quality Gate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"

jobs:
  quality:
    name: quality (${{ matrix.label }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # Default-features build: what CI actually ships from the release
          # workflow. Everything is exercised here, fmt, clippy, check, tests.
          - label: default
            features: ""
            extra_flags: ""
            run_fmt: true
            run_tests: true
          # `--all-features` includes `dev-fast` (bevy/dynamic_linking) which
          # is a local-iteration shortcut, not something we ship. Keep it
          # building, but only the cheap check, no need to repeat tests.
          - label: all-features
            features: "--all-features"
            extra_flags: ""
            run_fmt: false
            run_tests: false
          # Release-profile build: the ONLY leg with `debug_assertions` off, so
          # it is the one that compiles the shipped configuration. Catches
          # cfg(debug_assertions) mismatches, an item gated to debug builds but
          # named from always-compiled code, that every debug leg builds green
          # and only the release/publish build would have failed on. Default
          # features keep the compile bounded; the mismatch is orthogonal to
          # features so this still catches it.
          - label: release
            features: ""
            extra_flags: "--release"
            run_fmt: false
            run_tests: false
    steps:
      - name: Free up runner disk space
        # GitHub-hosted runners ship ~14 GB free, which a restored ~5 GB Cargo
        # cache plus an `--all-targets`/`--all-features` Bevy build can overrun.
        # Delete the large preinstalled toolchains this job never touches
        # (~25 GB) so the cache can stay on and builds stay fast.
        run: |
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/share/swift
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          df -h /

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ pkg-config libx11-dev libasound2-dev libudev-dev libxkbcommon-x11-0 libwayland-dev libxkbcommon-dev libopus-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install --profile minimal
          rustup component add clippy rustfmt

      - name: Cache Cargo data
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: quality
          shared-key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.label }}

      - name: Check formatting
        if: matrix.run_fmt
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --locked --all-targets ${{ matrix.features }} ${{ matrix.extra_flags }} -- -D warnings

      - name: Check all targets
        run: cargo check --locked --all-targets ${{ matrix.features }} ${{ matrix.extra_flags }}

      - name: Build docs
        # Default leg only. Gates the crate's intra-doc-link graph:
        # [lints.rustdoc] denies broken_intra_doc_links, and the codebase
        # uses those links as its internal cross-reference system, so a
        # rename that orphans them fails here instead of rotting silently.
        if: matrix.label == 'default'
        run: cargo doc --no-deps --locked --document-private-items

      - name: Run tests
        if: matrix.run_tests
        run: cargo test --locked --all-targets ${{ matrix.features }}
