<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0e13" />
    <meta name="robots" content="noindex" />
    <title>Lost in the fog · Ashwend</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" type="image/x-icon" />
    <style>
      @font-face {
        font-family: 'Cinzel';
        src: url('/fonts/Cinzel-Bold.woff2') format('woff2');
        font-weight: 700;
        font-display: swap;
      }
      :root {
        --ink-900: #0a0e13;
        --fg: #e6ebf2;
        --muted: #97a4b2;
        --ember-300: #f0b878;
        --ember-400: #ea9a4e;
        --ember-500: #e08433;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100svh;
        padding: 2rem 1.25rem;
        background:
          radial-gradient(
            120% 80% at 50% 120%,
            rgba(224, 132, 51, 0.16),
            transparent 60%
          ),
          var(--ink-900);
        color: var(--fg);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        text-align: center;
        -webkit-font-smoothing: antialiased;
      }
      main {
        max-width: 34rem;
      }
      .eyebrow {
        margin: 0 0 1.25rem;
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--ember-300);
      }
      h1 {
        margin: 0;
        font-family: 'Cinzel', ui-serif, Georgia, serif;
        font-weight: 700;
        line-height: 1.05;
        font-size: clamp(2.5rem, 1rem + 7vw, 4.5rem);
        background: linear-gradient(to bottom, #f6eedd, var(--ember-300));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p {
        margin: 1.5rem auto 0;
        max-width: 28rem;
        font-size: 1.125rem;
        line-height: 1.6;
        color: var(--muted);
      }
      .actions {
        margin-top: 2.25rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        padding: 0.8rem 1.6rem;
        font-weight: 600;
        font-size: 1rem;
        text-decoration: none;
        transition:
          background-color 0.2s,
          color 0.2s,
          border-color 0.2s;
      }
      .btn-primary {
        background: var(--ember-500);
        color: var(--ink-900);
      }
      .btn-primary:hover {
        background: var(--ember-400);
      }
      .btn-ghost {
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: var(--fg);
      }
      .btn-ghost:hover {
        border-color: rgba(255, 255, 255, 0.25);
        background: rgba(255, 255, 255, 0.06);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Error 404</p>
      <h1>Lost in the fog</h1>
      <p>
        This page wandered off the map. The trail back to Ashwend is right here.
      </p>
      <div class="actions">
        <a class="btn btn-primary" href="/">Back to the homepage</a>
        <a class="btn btn-ghost" href="/#playtest">Join the playtest</a>
      </div>
    </main>
  </body>
</html>
