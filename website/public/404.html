<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0e13" />
    <meta name="robots" content="noindex" />
    <title>Lost in the fog · Ashwend</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" type="image/x-icon" />
    <style>
      @font-face {
        font-family: 'Cinzel';
        src: url('/fonts/Cinzel-Bold.woff2') format('woff2');
        font-weight: 700;
        font-display: swap;
      }
      :root {
        --ink-900: #0a0e13;
        --fg: #e6ebf2;
        --muted: #97a4b2;
        --ember-300: #f0b878;
        --ember-400: #ea9a4e;
        --ember-500: #e08433;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100svh;
        padding: 2rem 1.25rem;
        background:
          radial-gradient(
            110% 70% at 50% 118%,
            rgba(224, 132, 51, 0.18),
            transparent 60%
          ),
          var(--ink-900);
        color: var(--fg);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        text-align: center;
        -webkit-font-smoothing: antialiased;
      }
      main {
        width: 100%;
        max-width: 40rem;
      }
      .logo {
        display: inline-flex;
        margin-bottom: 2.25rem;
        border-radius: 14px;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .logo:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.16);
      }
      .logo svg {
        display: block;
        border-radius: 14px;
      }
      .eyebrow {
        margin: 0 0 1.1rem;
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--ember-300);
      }
      h1 {
        margin: 0;
        font-family: 'Cinzel', ui-serif, Georgia, serif;
        font-weight: 700;
        line-height: 1.08;
        font-size: clamp(2.25rem, 1rem + 5vw, 3.5rem);
        text-wrap: balance;
        background: linear-gradient(to bottom, #f6eedd, var(--ember-300));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .lead {
        margin: 1.4rem auto 0;
        max-width: 30rem;
        font-size: 1.125rem;
        line-height: 1.6;
        text-wrap: balance;
        color: var(--muted);
      }
      .actions {
        margin-top: 2.25rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        padding: 0.8rem 1.6rem;
        font-weight: 600;
        font-size: 1rem;
        text-decoration: none;
        transition:
          background-color 0.2s ease,
          color 0.2s ease,
          border-color 0.2s ease;
      }
      .btn-primary {
        background: var(--ember-500);
        color: var(--ink-900);
      }
      .btn-primary:hover {
        background: var(--ember-400);
      }
      .btn-ghost {
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: var(--fg);
      }
      .btn-ghost:hover {
        border-color: rgba(255, 255, 255, 0.25);
        background: rgba(255, 255, 255, 0.06);
      }
    </style>
  </head>
  <body>
    <main>
      <a class="logo" href="/" aria-label="Ashwend home">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 64 64"
          width="58"
          height="58"
          aria-hidden="true"
        >
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#f3b765" />
              <stop offset="1" stop-color="#d8722f" />
            </linearGradient>
          </defs>
          <rect width="64" height="64" rx="14" fill="#0c1117" />
          <path
            d="M32 13 L47 51 H39.2 L36.1 42.4 H27.9 L24.8 51 H17 Z M30.1 35.6 H33.9 L32 29.9 Z"
            fill="url(#g)"
          />
        </svg>
      </a>
      <p class="eyebrow">Error 404</p>
      <h1>Lost in the fog</h1>
      <p class="lead">
        This page wandered off the map. The trail back to Ashwend is right here.
      </p>
      <div class="actions">
        <a class="btn btn-primary" href="/">Back to the homepage</a>
        <a class="btn btn-ghost" href="/#playtest">Join the playtest</a>
      </div>
    </main>
  </body>
</html>
